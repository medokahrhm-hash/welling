name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK inside official Kivy Docker image
        run: |
          docker run --rm -v "$(pwd)":/home/user/hostcwd kivy/buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-core-apk
          path: bin/*.apk
